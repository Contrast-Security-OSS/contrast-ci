name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (patch = bug fixes, minor = new features, major = breaking changes)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          COMMITS_SINCE=$(git log "${LATEST}..HEAD" --oneline | wc -l)
          if [ "$COMMITS_SINCE" -eq 0 ]; then
            echo "No new commits since ${LATEST}. Nothing to release."
            exit 1
          fi

          CURRENT="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.release_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          MAJOR_TAG="v${MAJOR}"

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR_TAG}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${NEW_VERSION} (floating tag: ${MAJOR_TAG})"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --target main \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Update floating major version tag
        run: |
          git fetch --tags
          MAJOR_TAG="${{ steps.version.outputs.major }}"
          NEW_VERSION="${{ steps.version.outputs.version }}"
          git tag -fa "${MAJOR_TAG}" "${NEW_VERSION}" -m "${MAJOR_TAG} -> ${NEW_VERSION}"
          git push origin "${MAJOR_TAG}" --force

